<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            overflow: hidden;
        }
        
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #4ade80;
            color: #1a1a2e;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            z-index: 100;
        }
        
        h1 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 32px;
            text-shadow: 0 0 20px rgba(74,222,128,0.5);
        }
        
        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        #gameCanvas {
            background: #0a0a0a;
            border: 4px solid #4ade80;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(74,222,128,0.3);
        }
        
        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 150px;
        }
        
        .info-box {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px 20px;
            text-align: center;
        }
        
        .info-box .label {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .info-box .value {
            color: #4ade80;
            font-size: 28px;
            font-weight: bold;
        }
        
        .next-piece {
            width: 120px;
            height: 120px;
            background: #0a0a0a;
            border: 2px solid rgba(74,222,128,0.5);
            border-radius: 8px;
            margin: 0 auto;
        }
        
        .controls {
            margin-top: 20px;
            color: #888;
            font-size: 14px;
            text-align: center;
            max-width: 400px;
        }
        
        .controls p {
            margin: 5px 0;
        }
        
        .btn {
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            color: #1a1a2e;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(74,222,128,0.4);
        }
        
        .game-over {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        
        .game-over.show {
            display: flex;
        }
        
        .game-over h2 {
            color: #4ade80;
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        .game-over .final-score {
            color: #fff;
            font-size: 24px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← 返回大厅</a>
    
    <h1>🧱 俄罗斯方块</h1>
    
    <div class="game-container">
        <canvas id="gameCanvas" width="300" height="600"></canvas>
        
        <div class="info-panel">
            <div class="info-box">
                <div class="label">得分</div>
                <div class="value" id="score">0</div>
            </div>
            
            <div class="info-box">
                <div class="label">等级</div>
                <div class="value" id="level">1</div>
            </div>
            
            <div class="info-box">
                <div class="label">下一个</div>
                <canvas id="nextCanvas" class="next-piece" width="120" height="120"></canvas>
            </div>
            
            <button class="btn" onclick="startGame()">开始游戏</button>
        </div>
    </div>
    
    <div class="controls">
        <p>← → 移动 | ↓ 加速 | ↑ 旋转 | 空格 硬降</p>
        <p>手机：点击屏幕左/右侧移动，点击中间旋转，向下滑动加速</p>
    </div>
    
    <div class="game-over" id="gameOver">
        <h2>游戏结束!</h2>
        <div class="final-score">最终得分: <span id="finalScore">0</span></div>
        <button class="btn" onclick="resetGame()">再来一局</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');
        
        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 30;
        
        // 颜色定义
        const COLORS = [
            null,
            '#00f5ff', // I - 青色
            '#ffff00', // O - 黄色
            '#ff00ff', // T - 紫色
            '#00ff00', // S - 绿色
            '#ff0000', // Z - 红色
            '#0000ff', // J - 蓝色
            '#ff8800', // L - 橙色
        ];
        
        // 方块形状
        const SHAPES = [
            [],
            [[1,1,1,1]],                           // I
            [[1,1],[1,1]],                         // O
            [[0,1,0],[1,1,1]],                     // T
            [[0,1,1],[1,1,0]],                     // S
            [[1,1,0],[0,1,1]],                     // Z
            [[1,0,0],[1,1,1]],                     // J
            [[0,0,1],[1,1,1]],                     // L
        ];
        
        let board = [];
        let currentPiece = null;
        let nextPiece = null;
        let score = 0;
        let level = 1;
        let gameInterval = null;
        let gameRunning = false;
        let dropCounter = 0;
        let dropInterval = 1000;
        
        // 初始化棋盘
        function initBoard() {
            board = [];
            for (let r = 0; r < ROWS; r++) {
                board[r] = [];
                for (let c = 0; c < COLS; c++) {
                    board[r][c] = 0;
                }
            }
        }
        
        // 创建新方块
        function createPiece(type) {
            const piece = {
                type: type,
                shape: SHAPES[type].map(row => [...row]),
                x: Math.floor(COLS / 2) - Math.floor(SHAPES[type][0].length / 2),
                y: 0
            };
            return piece;
        }
        
        // 随机生成方块
        function randomPiece() {
            return createPiece(Math.floor(Math.random() * 7) + 1);
        }
        
        // 绘制方块
        function drawBlock(context, x, y, color, size = BLOCK_SIZE) {
            context.fillStyle = color;
            context.fillRect(x * size + 1, y * size + 1, size - 2, size - 2);
            
            // 添加3D效果
            context.fillStyle = 'rgba(255,255,255,0.3)';
            context.fillRect(x * size + 1, y * size + 1, size - 2, 4);
            context.fillStyle = 'rgba(0,0,0,0.3)';
            context.fillRect(x * size + 1, y * size + size - 5, size - 2, 4);
        }
        
        // 绘制游戏
        function draw() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制已落下的方块
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (board[r][c]) {
                        drawBlock(ctx, c, r, COLORS[board[r][c]]);
                    }
                }
            }
            
            // 绘制当前方块
            if (currentPiece) {
                for (let r = 0; r < currentPiece.shape.length; r++) {
                    for (let c = 0; c < currentPiece.shape[r].length; c++) {
                        if (currentPiece.shape[r][c]) {
                            drawBlock(ctx, currentPiece.x + c, currentPiece.y + r, COLORS[currentPiece.type]);
                        }
                    }
                }
            }
            
            // 绘制网格线
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 1;
            for (let c = 1; c < COLS; c++) {
                ctx.beginPath();
                ctx.moveTo(c * BLOCK_SIZE, 0);
                ctx.lineTo(c * BLOCK_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let r = 1; r < ROWS; r++) {
                ctx.beginPath();
                ctx.moveTo(0, r * BLOCK_SIZE);
                ctx.lineTo(canvas.width, r * BLOCK_SIZE);
                ctx.stroke();
            }
        }
        
        // 绘制下一个方块
        function drawNext() {
            nextCtx.fillStyle = '#0a0a0a';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            
            if (nextPiece) {
                const shape = nextPiece.shape;
                const blockSize = 25;
                const offsetX = (nextCanvas.width - shape[0].length * blockSize) / 2 / blockSize;
                const offsetY = (nextCanvas.height - shape.length * blockSize) / 2 / blockSize;
                
                for (let r = 0; r < shape.length; r++) {
                    for (let c = 0; c < shape[r].length; c++) {
                        if (shape[r][c]) {
                            drawBlock(nextCtx, offsetX + c, offsetY + r, COLORS[nextPiece.type], blockSize);
                        }
                    }
                }
            }
        }
        
        // 检测碰撞
        function collide(piece, offsetX = 0, offsetY = 0) {
            for (let r = 0; r < piece.shape.length; r++) {
                for (let c = 0; c < piece.shape[r].length; c++) {
                    if (piece.shape[r][c]) {
                        const newX = piece.x + c + offsetX;
                        const newY = piece.y + r + offsetY;
                        
                        if (newX < 0 || newX >= COLS || newY >= ROWS) {
                            return true;
                        }
                        
                        if (newY >= 0 && board[newY][newX]) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }
        
        // 合并方块到棋盘
        function merge() {
            for (let r = 0; r < currentPiece.shape.length; r++) {
                for (let c = 0; c < currentPiece.shape[r].length; c++) {
                    if (currentPiece.shape[r][c]) {
                        const y = currentPiece.y + r;
                        const x = currentPiece.x + c;
                        if (y >= 0) {
                            board[y][x] = currentPiece.type;
                        }
                    }
                }
            }
        }
        
        // 消除行
        function clearLines() {
            let lines = 0;
            
            for (let r = ROWS - 1; r >= 0; r--) {
                let full = true;
                for (let c = 0; c < COLS; c++) {
                    if (!board[r][c]) {
                        full = false;
                        break;
                    }
                }
                
                if (full) {
                    board.splice(r, 1);
                    board.unshift(new Array(COLS).fill(0));
                    lines++;
                    r++;
                }
            }
            
            if (lines > 0) {
                // 计分：1行100，2行300，3行500，4行800
                const points = [0, 100, 300, 500, 800];
                score += points[lines] * level;
                
                // 升级
                const newLevel = Math.floor(score / 1000) + 1;
                if (newLevel > level) {
                    level = newLevel;
                    dropInterval = Math.max(100, 1000 - (level - 1) * 100);
                }
                
                document.getElementById('score').textContent = score;
                document.getElementById('level').textContent = level;
            }
        }
        
        // 旋转方块
        function rotate() {
            const rotated = [];
            const shape = currentPiece.shape;
            
            for (let c = 0; c < shape[0].length; c++) {
                rotated[c] = [];
                for (let r = shape.length - 1; r >= 0; r--) {
                    rotated[c].push(shape[r][c]);
                }
            }
            
            const original = currentPiece.shape;
            currentPiece.shape = rotated;
            
            // 如果旋转后碰撞，退回
            if (collide(currentPiece)) {
                // 尝试左右移动
                if (!collide(currentPiece, -1, 0)) {
                    currentPiece.x -= 1;
                } else if (!collide(currentPiece, 1, 0)) {
                    currentPiece.x += 1;
                } else if (!collide(currentPiece, -2, 0)) {
                    currentPiece.x -= 2;
                } else if (!collide(currentPiece, 2, 0)) {
                    currentPiece.x += 2;
                } else {
                    currentPiece.shape = original;
                }
            }
        }
        
        // 移动方块
        function move(dir) {
            if (!collide(currentPiece, dir, 0)) {
                currentPiece.x += dir;
            }
        }
        
        // 软降
        function drop() {
            if (!collide(currentPiece, 0, 1)) {
                currentPiece.y++;
                score += 1;
            } else {
                lock();
            }
        }
        
        // 硬降
        function hardDrop() {
            while (!collide(currentPiece, 0, 1)) {
                currentPiece.y++;
                score += 2;
            }
            lock();
        }
        
        // 锁定方块
        function lock() {
            merge();
            clearLines();
            document.getElementById('score').textContent = score;
            
            // 检查游戏结束
            if (collide(currentPiece, 0, 0)) {
                gameOver();
                return;
            }
            
            // 下一个方块
            currentPiece = nextPiece;
            nextPiece = randomPiece();
            drawNext();
        }
        
        // 游戏结束
        function gameOver() {
            gameRunning = false;
            clearInterval(gameInterval);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.add('show');
        }
        
        // 游戏循环
        function gameLoop(time = 0) {
            if (!gameRunning) return;
            
            dropCounter += time - lastTime;
            lastTime = time;
            
            if (dropCounter > dropInterval) {
                drop();
                dropCounter = 0;
            }
            
            draw();
            gameInterval = requestAnimationFrame(gameLoop);
        }
        
        let lastTime = 0;
        
        // 开始游戏
        function startGame() {
            if (gameRunning) return;
            
            initBoard();
            score = 0;
            level = 1;
            dropInterval = 1000;
            gameRunning = true;
            
            document.getElementById('score').textContent = '0';
            document.getElementById('level').textContent = '1';
            document.getElementById('gameOver').classList.remove('show');
            
            currentPiece = randomPiece();
            nextPiece = randomPiece();
            drawNext();
            
            lastTime = 0;
            dropCounter = 0;
            
            if (gameInterval) cancelAnimationFrame(gameInterval);
            gameLoop();
        }
        
        // 重置游戏
        function resetGame() {
            document.getElementById('gameOver').classList.remove('show');
            startGame();
        }
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            
            switch(e.key) {
                case 'ArrowLeft':
                    move(-1);
                    break;
                case 'ArrowRight':
                    move(1);
                    break;
                case 'ArrowDown':
                    drop();
                    break;
                case 'ArrowUp':
                case 'w':
                    rotate();
                    break;
                case ' ':
                    hardDrop();
                    break;
            }
            draw();
        });
        
        // 触摸控制
        let touchStartX = 0;
        let touchStartY = 0;
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        
        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (!gameRunning) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            
            // 判断滑动方向
            if (Math.abs(dx) > Math.abs(dy)) {
                // 水平滑动
                if (dx > 30) move(1);
                else if (dx < -30) move(-1);
            } else {
                // 垂直滑动
                if (dy > 30) drop();
                else if (dy < -30) rotate();
            }
            draw();
        });
        
        // 点击控制（简化为点击位置）
        canvas.addEventListener('click', (e) => {
            if (!gameRunning) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            
            if (x < rect.width / 3) {
                move(-1); // 左侧点击向左
            } else if (x > rect.width * 2 / 3) {
                move(1); // 右侧点击向右
            } else {
                rotate(); // 中间点击旋转
            }
            draw();
        });
        
        // 初始化
        initBoard();
        currentPiece = randomPiece();
        nextPiece = randomPiece();
        drawNext();
        draw();
    </script>
</body>
</html>
