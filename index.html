<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>游戏大厅 - 小游戏集合</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }
        
        h1 {
            color: #fff;
            font-size: 32px;
            margin-bottom: 30px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .game-container {
            width: 100%;
            max-width: 800px;
        }
        
        .game-menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        
        .game-card {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
        }
        
        .game-card:hover {
            transform: translateY(-5px);
            border-color: #4ade80;
            box-shadow: 0 10px 30px rgba(74,222,128,0.3);
        }
        
        .game-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .game-card.disabled:hover {
            transform: none;
            border-color: rgba(255,255,255,0.2);
            box-shadow: none;
        }
        
        .game-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .game-card h3 {
            font-size: 20px;
            margin-bottom: 8px;
        }
        
        .game-card p {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 15px;
        }
        
        .play-btn {
            display: inline-block;
            background: #4ade80;
            color: #1a1a2e;
            padding: 10px 25px;
            border-radius: 20px;
            font-weight: bold;
            transition: background 0.3s;
        }
        
        .game-card:hover .play-btn {
            background: #22c55e;
        }
        
        .coming-soon {
            display: inline-block;
            background: #374151;
            color: #9ca3af;
            padding: 10px 25px;
            border-radius: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>🎮 游戏大厅</h1>
    
    <div class="game-container">
        <div class="game-menu">
            <a href="snake.html" class="game-card">
                <div class="game-icon">🐍</div>
                <h3>贪吃的张进锋</h3>
                <p>控制你的张进锋吃掉食物，变得越来越长！</p>
                <span class="play-btn">开始游戏</span>
            </a>
            
            <a href="pool.html" class="game-card">
                <div class="game-icon">🎱</div>
                <h3>台球</h3>
                <p>经典8球台球单人练习</p>
                <span class="play-btn">开始游戏</span>
            </a>
            
            <a href="tetris.html" class="game-card">
                <div class="game-icon">🧱</div>
                <h3>俄罗斯方块</h3>
                <p>经典方块消除游戏</p>
                <span class="play-btn">开始游戏</span>
            </a>
            
            <a href="cutplay/menu.html" class="game-card">
                <div class="game-icon">🎮</div>
                <h3>消消乐</h3>
                <p>经典三消游戏，匹配相同图案</p>
                <span class="play-btn">开始游戏</span>
            </a>
            
            <div class="game-card disabled">
                <div class="game-icon">🃏</div>
                <h3>记忆翻牌</h3>
                <p>翻牌配对记忆游戏</p>
                <span class="coming-soon">敬请期待</span>
            </div>
        </div>
    </div>
</body>
</html>
