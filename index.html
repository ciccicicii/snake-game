<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>贪吃的张进锋大作战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 10px;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .header {
            text-align: center;
            color: #fff;
        }

        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 5px;
        }

        .score-board {
            display: flex;
            gap: 30px;
            font-size: 18px;
            color: #ccc;
        }

        .score-board span {
            color: #27ae60;
            font-weight: bold;
        }

        .game-wrapper {
            position: relative;
            background: #fff;
            border-radius: 15px;
            padding: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        #gameCanvas {
            display: block;
            background: #ffffff;
            border: 3px solid #333;
            border-radius: 10px;
        }

        .start-screen, .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            color: #333;
            text-align: center;
            padding: 20px;
        }

        .start-screen h2, .game-over-screen h2 {
            font-size: 32px;
            color: #27ae60;
            margin-bottom: 20px;
        }

        .start-screen p, .game-over-screen p {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
        }

        .final-score {
            font-size: 48px;
            color: #27ae60;
            font-weight: bold;
            margin: 20px 0;
        }

        .btn {
            background: linear-gradient(135deg, #27ae60 0%, #219653 100%);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 10px rgba(39, 174, 96, 0.3);
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 260px;
            margin: 15px auto 0;
        }

        .control-btn {
            width: 80px;
            height: 80px;
            background: rgba(0, 255, 136, 0.2);
            border: 3px solid #00ff88;
            border-radius: 20px;
            color: #00ff88;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .control-btn:active {
            background: rgba(0, 255, 136, 0.3);
            transform: scale(0.95);
        }

        .control-btn.up { grid-column: 2; }
        .control-btn.left { grid-column: 1; grid-row: 2; }
        .control-btn.down { grid-column: 2; grid-row: 2; }
        .control-btn.right { grid-column: 3; grid-row: 2; }

        .tips { font-size: 18px;
            color: #666;
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
        }

        .hidden {
            display: none !important;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .loading {
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🐍 贪吃的张进锋大作战</h1>
            <div class="score-board">
                <div>得分: <span id="score">0</span></div>
                <div>最高: <span id="highScore">0</span></div>
            </div>
        </div>

        <div class="game-wrapper">
            <canvas id="gameCanvas"></canvas>
            
            <div class="start-screen" id="startScreen">
                <img src="https://raw.githubusercontent.com/ciccicicii/snake-game/main/images/avatar.jpg" alt="张进锋" style="width:150px;border-radius:50%;margin-bottom:20px;border:3px solid #27ae60;">
                <h2>开始游戏</h2>
                <p>点击按键控制你的张进锋移动</p>
                <button class="btn" onclick="startGame()">开始</button>
            </div>

            <div class="game-over-screen hidden" id="gameOverScreen">
                <h2>游戏结束</h2>
                <p>最终得分</p>
                <div class="final-score" id="finalScore">0</div>
                <button class="btn" onclick="startGame()">再来一局</button>
            </div>
        </div>

        <div class="controls">
            <button class="control-btn up" onclick="changeDirection('up')">⬆️</button>
            <button class="control-btn left" onclick="changeDirection('left')">⬅️</button>
            <button class="control-btn down" onclick="changeDirection('down')">⬇️</button>
            <button class="control-btn right" onclick="changeDirection('right')">➡️</button>
        </div>

        <div class="tips">点击屏幕上方按钮或使用键盘控制</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 游戏配置
        const GRID_SIZE = 20;
        let GRID_COUNT = 18;
        
        // 调整画布大小
        function resizeCanvas() {
            const maxSize = Math.min(window.innerWidth - 40, 360);
            canvas.width = maxSize;
            canvas.height = maxSize;
            GRID_COUNT = Math.floor(maxSize / GRID_SIZE);
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // 游戏状态
        let snake = [];
        let food = {};
        let direction = 'right';
        let nextDirection = 'right';
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let gameSpeed = 250;
        let isGameRunning = false;
        
        // 显示最高分
        document.getElementById('highScore').textContent = highScore;
        
        // 初始化蛇
        function initSnake() {
            snake = [
                { x: 5, y: Math.floor(GRID_COUNT / 2) },
                { x: 4, y: Math.floor(GRID_COUNT / 2) },
                { x: 3, y: Math.floor(GRID_COUNT / 2) }
            ];
        }
        
        // 生成食物
        function generateFood() {
            let validPosition = false;
            while (!validPosition) {
                food = {
                    x: Math.floor(Math.random() * GRID_COUNT),
                    y: Math.floor(Math.random() * GRID_COUNT)
                };
                validPosition = !snake.some(segment => 
                    segment.x === food.x && segment.y === food.y
                );
            }
        }
        
        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格
            ctx.strokeStyle = '#eee';
            for (let i = 0; i <= GRID_COUNT; i++) {
                ctx.beginPath();
                ctx.moveTo(i * GRID_SIZE, 0);
                ctx.lineTo(i * GRID_SIZE, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * GRID_SIZE);
                ctx.lineTo(canvas.width, i * GRID_SIZE);
                ctx.stroke();
            }
            
            // 绘制食物
            const foodGradient = ctx.createRadialGradient(
                food.x * GRID_SIZE + GRID_SIZE / 2,
                food.y * GRID_SIZE + GRID_SIZE / 2,
                0,
                food.x * GRID_SIZE + GRID_SIZE / 2,
                food.y * GRID_SIZE + GRID_SIZE / 2,
                GRID_SIZE / 2
            );
            foodGradient.addColorStop(0, '#e74c3c');
            foodGradient.addColorStop(1, '#c0392b');
            ctx.fillStyle = foodGradient;
            ctx.beginPath();
            ctx.arc(
                food.x * GRID_SIZE + GRID_SIZE / 2,
                food.y * GRID_SIZE + GRID_SIZE / 2,
                GRID_SIZE / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            
            // 绘制蛇
            snake.forEach((segment, index) => {
                const isHead = index === 0;
                const alpha = 1 - (index / snake.length) * 0.3;
                
                if (isHead) {
                    ctx.fillStyle = '#27ae60';
                    ctx.shadowColor = '#27ae60';
                    ctx.shadowBlur = 5;
                } else {
                    ctx.fillStyle = `rgba(39, 174, 96, ${alpha})`;
                    ctx.shadowBlur = 0;
                }
                
                ctx.beginPath();
                ctx.roundRect(
                    segment.x * GRID_SIZE + 1,
                    segment.y * GRID_SIZE + 1,
                    GRID_SIZE - 2,
                    GRID_SIZE - 2,
                    5
                );
                ctx.fill();
                ctx.shadowBlur = 0;
            });
        }
        
        // 更新游戏状态
        function update() {
            direction = nextDirection;
            
            const head = { ...snake[0] };
            
            switch (direction) {
                case 'up': head.y--; break;
                case 'down': head.y++; break;
                case 'left': head.x--; break;
                case 'right': head.x++; break;
            }
            
            // 撞墙检测
            if (head.x < 0 || head.x >= GRID_COUNT || head.y < 0 || head.y >= GRID_COUNT) {
                gameOver();
                return;
            }
            
            // 撞自己检测
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }
            
            snake.unshift(head);
            
            // 吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                
                // 显示特效
                showAvatarEffect();
                
                // 每50分加速
                if (score % 100 === 0 && gameSpeed > 80) {
                    gameSpeed -= 5;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameStep, gameSpeed);
                }
                
                generateFood();
            } else {
                snake.pop();
            }
            
            draw();
        }
        
        // 单步游戏
        function gameStep() {
            update();
        }
        
        // 头像特效
        function showAvatarEffect() {
            const avatar = document.createElement('img');
            avatar.src = 'https://raw.githubusercontent.com/ciccicicii/snake-game/main/images/avatar.jpg';
            avatar.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);width:120px;border-radius:50%;border:4px solid #27ae60;z-index:9999;pointer-events:none;transition:all 0.3s ease-out;';
            document.body.appendChild(avatar);
            
            // 动画效果
            setTimeout(() => {
                avatar.style.transform = 'translate(-50%,-50%) scale(1.5)';
                avatar.style.opacity = '1';
            }, 10);
            
            setTimeout(() => {
                avatar.style.transform = 'translate(-50%,-50%) scale(2)';
                avatar.style.opacity = '0';
            }, 300);
            
            setTimeout(() => {
                avatar.remove();
            }, 600);
        }
        
        // 开始游戏
        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            
            initSnake();
            generateFood();
            score = 0;
            gameSpeed = 150;
            direction = 'right';
            nextDirection = 'right';
            document.getElementById('score').textContent = score;
            
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(gameStep, gameSpeed);
            isGameRunning = true;
            
            draw();
        }
        
        // 游戏结束
        function gameOver() {
            isGameRunning = false;
            clearInterval(gameLoop);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }
        
        // 改变方向
        function changeDirection(dir) {
            if (!isGameRunning) return;
            
            const opposites = {
                'up': 'down',
                'down': 'up',
                'left': 'right',
                'right': 'left'
            };
            
            if (opposites[dir] !== direction) {
                nextDirection = dir;
            }
        }
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) return;
            
            const keyMap = {
                'ArrowUp': 'up',
                'ArrowDown': 'down',
                'ArrowLeft': 'left',
                'ArrowRight': 'right',
                'w': 'up',
                's': 'down',
                'a': 'left',
                'd': 'right'
            };
            
            const dir = keyMap[e.key];
            if (dir) {
                e.preventDefault();
                changeDirection(dir);
            }
        });
        
        // 触摸滑动控制
        let touchStartX = 0;
        let touchStartY = 0;
        
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        
        canvas.addEventListener('touchend', (e) => {
            if (!isGameRunning) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;
            
            const minSwipe = 30;
            
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > minSwipe) changeDirection('right');
                else if (diffX < -minSwipe) changeDirection('left');
            } else {
                if (diffY > minSwipe) changeDirection('down');
                else if (diffY < -minSwipe) changeDirection('up');
            }
        });
        
        // 阻止默认触摸行为
        document.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });
        
        // 初始化显示
        draw();
    </script>
</body>
</html>
